<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arch Linux — News & Wiki</title>
<style>
  :root {
    --blue:       #1793d1;
    --blue-dim:   #0f5f8a;
    --blue-faint: rgba(23,147,209,0.12);
    --bg:         #0d1117;
    --bg-panel:   #111820;
    --bg-card:    #161e27;
    --bg-header:  #0e1620;
    --border:     #1e2d3d;
    --text:       #c9d1d9;
    --dim:        #6a737d;
    --bright:     #e6edf3;
    --green:      #3fb950;
    --amber:      #d29922;
    --red:        #f85149;
    --tip:        #a371f7;
    --rss:        #f4a261;
    --mono: 'JetBrains Mono','Cascadia Code','Fira Code',Consolas,monospace;
    --ui:   system-ui,-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);font-family:var(--ui);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:20px;
  }
  .widget{
    width:100%;max-width:480px;
    border:1px solid var(--border);border-radius:10px;
    background:var(--bg-panel);
    box-shadow:0 12px 40px rgba(0,0,0,.7),0 0 0 1px rgba(23,147,209,.07);
    overflow:hidden;
  }

  /* HEADER */
  .header{
    display:flex;align-items:center;gap:12px;
    padding:12px 14px;background:var(--bg-header);
    border-bottom:1px solid var(--border);
    cursor:pointer;user-select:none;
  }
  .header:hover{background:#111e2b;}
  .logo-img{
    width:48px;height:48px;flex-shrink:0;
    object-fit:contain;
    mix-blend-mode:screen;
    filter:drop-shadow(0 0 6px rgba(23,147,209,.5));
  }
  .header-info{flex:1;overflow:hidden;}
  .header-title{
    font-family:var(--mono);font-size:13px;font-weight:600;
    color:var(--bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .header-title em{color:var(--dim);font-style:normal;}
  .header-sub{
    font-family:var(--mono);font-size:10px;color:var(--dim);
    letter-spacing:.06em;margin-top:2px;
  }
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
  .dot-row{display:flex;align-items:center;gap:5px;}
  .dot-label{font-family:var(--mono);font-size:11px;color:var(--dim);}
  .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--amber);box-shadow:0 0 8px var(--amber);
    animation:pulse 2s ease-in-out infinite;
  }
  .dot.ok   {background:var(--green);box-shadow:0 0 8px var(--green);}
  .dot.error{background:var(--red);box-shadow:0 0 8px var(--red);animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .bottom-row{display:flex;align-items:center;gap:8px;}
  .chevron{font-size:10px;color:var(--dim);transition:transform .25s;}
  .widget.open .chevron{transform:rotate(180deg);}

  /* LANG TOGGLE */
  .lang-toggle{
    display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;
  }
  .lang-btn{
    padding:2px 7px;background:transparent;border:none;
    font-family:var(--mono);font-size:10px;color:var(--dim);cursor:pointer;
    transition:background .15s,color .15s;
  }
  .lang-btn.active{background:var(--blue-faint);color:var(--blue);}
  .lang-btn:hover:not(.active){color:var(--text);}

  /* RSS PREVIEW */
  .rss-preview{border-bottom:1px solid var(--border);}
  .rss-item{
    display:flex;align-items:center;gap:8px;
    padding:7px 14px;text-decoration:none;
    border-bottom:1px solid rgba(30,45,61,.5);
    transition:background .15s;
  }
  .rss-item:last-child{border-bottom:none;}
  .rss-item:hover{background:#0f1d2b;}
  /* RSS icon SVG */
  .rss-icon{flex-shrink:0;width:14px;height:14px;}
  .rss-title{
    font-family:var(--mono);font-size:11px;color:var(--text);
    flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  }
  .rss-item:hover .rss-title{color:var(--blue);}
  .rss-date{font-family:var(--mono);font-size:10px;color:var(--dim);flex-shrink:0;}

  /* TICKER */
  .ticker-wrap{
    overflow:hidden;position:relative;
    border-bottom:1px solid var(--border);
    background:rgba(23,147,209,.02);
  }
  .ticker-wrap::before,.ticker-wrap::after{
    content:'';position:absolute;top:0;bottom:0;width:28px;z-index:2;pointer-events:none;
  }
  .ticker-wrap::before{left:0;background:linear-gradient(to right,var(--bg-panel),transparent);}
  .ticker-wrap::after {right:0;background:linear-gradient(to left,var(--bg-panel),transparent);}
  .ticker-track{
    display:flex;align-items:center;white-space:nowrap;
    animation:scroll 80s linear infinite;
  }
  .ticker-track:hover{animation-play-state:paused;}
  @keyframes scroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
  .t-item{
    display:inline-flex;align-items:center;gap:6px;
    padding:7px 16px 7px 10px;
    font-family:var(--mono);font-size:11px;color:var(--text);
    text-decoration:none;flex-shrink:0;transition:color .15s;
  }
  .t-item:hover{color:var(--blue);}
  .t-item.is-tip{color:var(--tip);cursor:default;}
  .t-item.is-tip:hover{color:var(--tip);}
  .t-arch-sm{width:10px;height:10px;opacity:.7;flex-shrink:0;}
  .t-tip-tag{
    font-family:var(--mono);font-size:9px;color:var(--tip);
    border:1px solid rgba(163,113,247,.3);border-radius:2px;
    padding:0 3px;letter-spacing:.04em;flex-shrink:0;
  }
  .t-date{color:var(--dim);font-size:10px;}
  .t-sep{color:var(--blue);opacity:.2;font-size:9px;margin:0 2px;}
  .t-sep-tip{color:var(--tip);opacity:.2;font-size:9px;margin:0 2px;}

  /* PANEL */
  .panel{max-height:0;overflow:hidden;transition:max-height .35s cubic-bezier(.4,0,.2,1);}
  .widget.open .panel{max-height:700px;overflow-y:auto;}
  .panel::-webkit-scrollbar{width:3px;}
  .panel::-webkit-scrollbar-track{background:transparent;}
  .panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  /* WIKI SEARCH */
  .search-bar{
    display:flex;align-items:center;
    padding:8px 12px;border-bottom:1px solid var(--border);background:var(--bg-card);
  }
  .search-label{font-family:var(--mono);font-size:11px;color:var(--blue);padding-right:8px;flex-shrink:0;opacity:.85;}
  .search-input{
    flex:1;background:var(--bg-panel);border:1px solid var(--border);border-radius:4px;
    color:var(--bright);font-family:var(--mono);font-size:12px;padding:5px 10px;outline:none;
    transition:border-color .15s;
  }
  .search-input::placeholder{color:var(--dim);}
  .search-input:focus{border-color:var(--blue-dim);}
  .search-btn{
    margin-left:6px;background:var(--bg-panel);border:1px solid var(--border);
    color:var(--text);font-family:var(--mono);font-size:11px;
    padding:5px 12px;border-radius:4px;cursor:pointer;transition:all .15s;flex-shrink:0;
  }
  .search-btn:hover{border-color:var(--blue-dim);color:var(--blue);}

  /* WIKI RESULT */
  .wiki-result{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg-panel);}
  .wiki-result.hidden{display:none;}
  .wiki-title{font-family:var(--mono);font-size:12px;color:var(--blue);margin-bottom:5px;font-weight:600;}
  .wiki-snippet{font-size:12px;color:var(--text);line-height:1.65;margin-bottom:8px;}
  .wiki-footer{display:flex;justify-content:space-between;align-items:center;}
  .wiki-page{font-family:var(--mono);font-size:11px;color:var(--blue);text-decoration:none;opacity:.75;}
  .wiki-page:hover{opacity:1;}
  .wiki-full{font-family:var(--mono);font-size:11px;color:var(--dim);text-decoration:none;}
  .wiki-full:hover{color:var(--blue);}
  .wiki-msg{font-family:var(--mono);font-size:11px;color:var(--dim);}

  /* NEWS CARDS */
  .panel-inner{padding:8px 10px;display:flex;flex-direction:column;gap:4px;}
  .panel-hdr{
    font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.07em;
    padding:0 2px 7px;border-bottom:1px solid var(--border);margin-bottom:2px;
  }
  .card{
    display:flex;align-items:center;gap:9px;
    padding:8px 11px;border:1px solid var(--border);border-radius:6px;
    background:var(--bg-card);text-decoration:none;
    transition:border-color .15s,background .15s;
  }
  .card:hover{border-color:var(--blue-dim);background:#152030;}
  .card-logo{width:16px;height:16px;flex-shrink:0;object-fit:contain;opacity:.85;}
  .card-title{
    font-family:var(--mono);font-size:12px;color:var(--bright);
    flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  }
  .card:hover .card-title{color:var(--blue);}
  .card-date{font-family:var(--mono);font-size:10px;color:var(--dim);flex-shrink:0;}

  /* FOOTER */
  .footer{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 14px;border-top:1px solid var(--border);background:var(--bg-header);
  }
  .footer-txt{font-family:var(--mono);font-size:10px;color:var(--dim);}
  .footer-lnk{font-family:var(--mono);font-size:10px;color:var(--blue);text-decoration:none;opacity:.8;}
  .footer-lnk:hover{opacity:1;}
  .state{font-family:var(--mono);font-size:11px;color:var(--dim);padding:16px;text-align:center;}
</style>
</head>

let lang = localStorage.getItem('arch-widget-lang') || 'en';
let newsData = [];

function t(key, ...args) {
  const v = I18N[lang][key];
  return typeof v === 'function' ? v(...args) : v;
}
function setLang(l) {
  lang = l;
  localStorage.setItem('arch-widget-lang', l);
  document.getElementById('btnEN').classList.toggle('active', l==='en');
  document.getElementById('btnJA').classList.toggle('active', l==='ja');
  document.getElementById('searchInput').placeholder = t('searchPlaceholder');
  document.getElementById('searchBtn').textContent   = t('searchBtn');
  if (newsData.length) { renderPreview(newsData); renderTicker(newsData); renderCards(newsData); }
}

const WIKI = 'https://wiki.archlinux.org/api.php';

// Data injected by fetch-news.sh
function loadNews() {
  if (typeof ARCH_NEWS_DATA !== 'undefined') return Promise.resolve(ARCH_NEWS_DATA);
  return Promise.resolve(null);
}

function buildSequence(news) {
  const tips = I18N[lang].tips;
  const seq = [];
  news.forEach((item, i) => {
    seq.push({type:'news', ...item});
    if ((i+1) % 3 === 0) seq.push({type:'tip', text: tips[Math.floor(i/3) % tips.length]});
  });
  return seq;
}

function renderPreview(data) {
  const wrap = document.getElementById('rssPreview');
  wrap.innerHTML = '';
  data.slice(0,2).forEach(d => {
    const a = document.createElement('a');
    a.className = 'rss-item'; a.href = d.link; a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = `<span class="rss-icon">${RSS_ICON}</span><span class="rss-title">${esc(d.title)}</span><span class="rss-date">${d.date||'—'}</span>`;
    wrap.appendChild(a);
  });
}

function renderTicker(data) {
  const track = document.getElementById('tickerTrack');
  const seq = buildSequence(data);
  const makeItems = () => seq.map(item => {
    if (item.type === 'tip') {
      const s = document.createElement('span');
      s.className = 't-item is-tip';
      s.innerHTML = `<span class="t-tip-tag">${t('tipTag')}</span>${esc(item.text)}<span class="t-sep-tip">◆</span>`;
      return s;
    }
    const a = document.createElement('a');
    a.className = 't-item'; a.href = item.link; a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = `${ARCH_SM}<span class="t-date">${item.date||'——'}</span>${esc(item.title)}<span class="t-sep">◆</span>`;
    return a;
  });
  track.innerHTML = '';
  [...makeItems(),...makeItems()].forEach(el => track.appendChild(el));
  const chars = seq.reduce((s,i) => s+(i.title||i.text||'').length, 0);
  track.style.animationDuration = Math.max(40, chars*0.30) + 's';
}

function renderCards(data) {
  const inner = document.getElementById('panelInner');
  inner.innerHTML = `<div class="panel-hdr">${t('newsHeader', data.length)}</div>`;
  data.forEach(d => {
    const a = document.createElement('a');
    a.className = 'card'; a.href = d.link;
    a.innerHTML = `<img class="card-logo" src="${ARCH_LOGO}" alt=""><div class="card-title">${esc(d.title)}</div><span class="card-date">${d.date||'—'}</span>`;
    inner.appendChild(a);
  });
}

async function searchWiki(query) {
  const box = document.getElementById('wikiResult');
  box.className = 'wiki-result';
  box.innerHTML = `<div class="wiki-msg">${t('searching')}</div>`;
  try {
    const sr = await fetch(`${WIKI}?action=query&list=search&srsearch=${encodeURIComponent(query)}&srlimit=1&format=json&origin=*`,{signal:AbortSignal.timeout(7000)});
    const sd = await sr.json();
    const hit = sd?.query?.search?.[0];
    if (!hit) { box.innerHTML = `<div class="wiki-msg">${t('noResults')}</div>`; return; }
    const er = await fetch(`${WIKI}?action=query&prop=extracts&exintro=true&exsentences=4&explaintext=true&titles=${encodeURIComponent(hit.title)}&format=json&origin=*`,{signal:AbortSignal.timeout(7000)});
    const ed = await er.json();
    const page = Object.values(ed?.query?.pages||{})[0];
    const extract = page?.extract?.trim() || hit.snippet?.replace(/<[^>]+>/g,'') || '';
    const url = `https://wiki.archlinux.org/title/${encodeURIComponent(hit.title.replace(/ /g,'_'))}`;
    box.innerHTML = `
      <div class="wiki-title">§ ${esc(hit.title)}</div>
      <div class="wiki-snippet">${esc(extract.slice(0,380))}${extract.length>380?'…':''}</div>
      <div class="wiki-footer">
        <a class="wiki-page" href="${url}" target="_blank" rel="noopener">${esc(hit.title)}</a>
        <a class="wiki-full" href="${url}" target="_blank" rel="noopener">${t('wikiLink')} ↗</a>
      </div>`;
  } catch(e) {
    box.innerHTML = `<div class="wiki-msg">error: ${esc(String(e))}</div>`;
  }
}

document.getElementById('header').addEventListener('click', () => {

  w.classList.toggle('open');

});
document.getElementById('searchBtn').addEventListener('click', () => { const q=document.getElementById('searchInput').value.trim(); if(q) searchWiki(q); });
document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter'){const q=e.target.value.trim();if(q)searchWiki(q);} });

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

(async () => {
  setLang(lang);
  const data = await loadNews();
  const dot = document.getElementById('dot');
  if (!data || !data.items || !data.items.length) {
    dot.className = 'dot error';
    document.getElementById('itemCount').textContent = '— news.json not found';
    document.getElementById('itemCount').style.color = 'var(--red)';
    document.getElementById('tickerTrack').innerHTML = `<span class="t-item" style="color:var(--red)">${t('tickerFail')}</span>`;
    document.getElementById('panelInner').innerHTML  = `<div class="state">${t('fetchFailed')}</div>`;
    return;
  }
  newsData = data.items;
  dot.className = 'dot ok';
  document.getElementById('itemCount').textContent = `— ${newsData.length} items`;
  document.getElementById('lastUpdated').textContent = t('updated')+' '+(data.updated || new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
  renderPreview(newsData);
  renderTicker(newsData);
  renderCards(newsData);
})();

// Intercept all link clicks and pass to Python via document.title
document.addEventListener('click', function(e) {
  const a = e.target.closest('a');
  if (a && a.href && a.href.startsWith('http')) {
    e.preventDefault();
    document.title = 'open:' + a.href;
    setTimeout(() => { document.title = 'expanded'; }, 500);
  }
}, true);
